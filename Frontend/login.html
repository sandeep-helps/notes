<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enggnotes</title>

    <link rel="stylesheet" href="CSS/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<div id="notificationArea"></div>

<video autoplay loop muted id="video1">
    <source src="video1.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">

    <div class="logo">
        <i class="fas fa-graduation-cap"></i>
        <h1>Enggnotes</h1>
    </div>

    <div class="form-toggle">
        <button id="loginBtn" class="toggle-btn active" onclick="showLogin()">Login</button>
        <button id="signupBtn" class="toggle-btn" onclick="showSignup()">Sign Up</button>
    </div>

    <!-- LOGIN -->
    <div class="form-container active" id="loginForm">
        <form id="loginFormElement">

            <input id="login-email" type="email" placeholder="Email" required>
            <input id="login-password" type="password" placeholder="Password" required>

            <button type="submit" class="submit-btn">Login</button>

        </form>
    </div>

    <!-- SIGNUP -->
    <div class="form-container" id="signupForm">
        <form id="signupFormElement">

            <input id="signup-name" type="text" placeholder="Full Name" required>
            <input id="signup-email" type="email" placeholder="Email" required>
            <input id="signup-password" type="password" placeholder="Password" required>
            <input id="confirm-password" type="password" placeholder="Confirm Password" required>

            <select id="signup-course" required>
                <option value="">Select Course</option>
                <option value="CSE">CSE</option>
                <option value="ECE">ECE</option>
                <option value="EE">EE</option>
                <option value="ME">ME</option>
                <option value="CE">CE</option>
            </select>

            <button type="submit" class="submit-btn">Create Account</button>

        </form>
    </div>

</div>

<script>
function showLogin(){
    document.getElementById("loginForm").classList.add("active");
    document.getElementById("signupForm").classList.remove("active");
}
function showSignup(){
    document.getElementById("signupForm").classList.add("active");
    document.getElementById("loginForm").classList.remove("active");
}
</script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<!-- Auth -->
<script src="JAVASCRIPT/auth.js"></script>

</body>
</html>
